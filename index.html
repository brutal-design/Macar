<!DOCTYPE html>
<!--
  ============================================================
   СТРУКТУРА HTML-ДОКУМЕНТА (шпаргалка для навчання)
  ============================================================
   <!DOCTYPE html>   → каже браузеру: "це сучасний HTML5"
   <html>            → корінь усієї сторінки
     ├─ <head>       → НЕвидима частина: налаштування + підключення стилів
     └─ <body>       → ВИДИМА частина: усе, що бачить користувач
  ============================================================
-->
<html lang="uk">

<head>
  <!-- Кодування. Завдяки UTF-8 коректно показуються українські літери (і емодзі). -->
  <meta charset="UTF-8">

  <!-- Робить сторінку адаптивною (гарно виглядає на телефоні, а не зменшеною копією десктопа). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Текст, який видно у вкладці браузера. -->
  <title>Macar — моя перша сторінка на Tailwind</title>

  <!--
    Підключення TailwindCSS через CDN.
    Tailwind — це набір готових класів-утиліт. Замість писати CSS вручну,
    ти просто додаєш класи прямо в HTML:
        class="text-center"  →  вирівняти текст по центру
        class="p-4"          →  внутрішній відступ (padding) з усіх боків
        class="rounded-xl"   →  заокруглити кути
    CDN-варіант ідеальний для навчання. У реальних проєктах ставлять збірку.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!--
  <body> — видима частина. Класи на ньому керують усім екраном:
    min-h-screen          → мінімальна висота = весь екран
    bg-gradient-to-br ... → градієнтний фон (зліва-зверху → справа-вниз)
    flex                  → вмикає "флекс" — зручне центрування
    items-center          → центр по вертикалі
    justify-center        → центр по горизонталі
    p-4                   → відступ від країв екрана
-->
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-700 flex items-center justify-center p-4 font-sans">

  <!--
    ===================== КАРТКА (CARD) =====================
    Картка — це просто контейнер <div> з гарним оформленням.
    Розбери класи нижче — це і є "магія" Tailwind:
      bg-white     → білий фон
      rounded-2xl  → сильно заокруглені кути
      shadow-xl    → велика м'яка тінь
      max-w-sm     → максимальна ширина (картка не розтягнеться занадто)
      w-full       → займає всю доступну ширину (до max-w-sm)
      p-8          → внутрішній відступ
      text-center  → текст по центру
  -->
  <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-8 text-center">

    <!-- Аватар: кружечок (rounded-full) з градієнтом і емодзі всередині. -->
    <div class="w-24 h-24 mx-auto rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-4xl">
      🧑‍🎨
    </div>

    <!-- Ім'я. <h1> — головний заголовок сторінки. -->
    <h1 class="mt-4 text-2xl font-bold text-slate-800">Macar</h1>

    <!-- Роль. <p> — абзац тексту. -->
    <p class="text-indigo-500 font-medium">Design Engineer</p>

    <!-- Короткий опис. text-sm — менший шрифт, text-slate-500 — приглушений сірий колір. -->
    <p class="mt-3 text-slate-500 text-sm">
      Вивчаю HTML і CSS 🚀 Це моя перша сторінка на TailwindCSS.
    </p>

    <!--
      Теги-навички. flex-wrap → переносить на новий рядок, якщо не влазять.
      gap-2 → відстань між тегами. Кожен тег — це <span> (рядковий контейнер).
    -->
    <div class="mt-5 flex flex-wrap justify-center gap-2">
      <span class="bg-slate-100 text-slate-600 text-xs px-3 py-1 rounded-full">HTML</span>
      <span class="bg-slate-100 text-slate-600 text-xs px-3 py-1 rounded-full">CSS</span>
      <span class="bg-slate-100 text-slate-600 text-xs px-3 py-1 rounded-full">Tailwind</span>
    </div>

    <!--
      Кнопка. Зверни увагу на префікс hover: — це стиль, що вмикається
      ТІЛЬКИ при наведенні миші. transition-colors робить зміну кольору плавною.
    -->
    <button class="mt-6 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2.5 rounded-xl transition-colors">
      Привітатись 👋
    </button>

  </div>

</body>
</html>
